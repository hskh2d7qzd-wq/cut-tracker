snap icin, terazide"], ["Su (sos icin)", "30g", "yarim fincan"], ["CUT: Roomboter KULLANMA", "0g", "normalde 2 parca tereyagi = ~14g = 11.5g saf yag. SPREY kullan!"]], "steps": ["FASULYE PISIR: Fasulyelerin uclarini parmaginla kopar (sert uc kisim). Tencereye ~300g su + bir tutam tuz koy, kaynat. Fasulyeleri (75g) ekle, 4 dk pisir. Son 2 dakikada sugar snapleri (50g) ekle. Toplam 6 dk. Suzgece dok, kenara koy.", "MANTARLARI HAZIIRLA: Champignonlari (125g) once yarim kes, sonra her yarimi 3-4mm kalinliginda dilimle. Sogani yarim halka seklinde kes.", "SOS YAP: Tavaya PISIRME SPREYI sik (2 puskurtme). Orta ates. Ketjap 14g + hardal 5g + chutney 20g + sambal 2g + 30g su ekle. Kasikla karistir, fokurdayinca 1 dk bekle — sos kivama gelsin.", "KOFTELERI PISIR: Geyik koftelerini (3-4 adet, ~120g) sosa ekle. Kapagi koy, atesi KISIK yap. 8-9 dk pisir. Her 3 dk'da kapagi ac, kasikla cevir. Kofte icten pismeli — birini kes bak, icerisi pembe olmamali.", "SEBZELERI EKLE: Dilimli mantarlari tavaya ekle. Pisirmis oldugn fasulye + sugar snap'i de geri ekle. Yarim paket Koreaanse kruidenmix serpistir. 3g olijfolie gezdir. 2-3 dk karistirarak pisir.", "SOGAN KAVUR: Sogani ayri kucuk tavada pisirme spreyiyle 2-3 dk kavur (normalde tereyaginda yapilir ama CUT icin sprey).", "TABAKLA: Tabaga kofteleri + sebzeleri koy. Sosu uzerlerine gezdir. Kavrulmus sogani ustune koy.", "YANINDA: 1 buyuk bardak su (300g)."], "tips": ["Geyik eti cok yagsiz (~2g yag/100g). AMA HelloFresh tarifi 2x tereyagi kullaniyor = 11.5g extra yag. CUT'ta bunu SPREY ile degistiriyoruz, 14.5g yag tasarruf!", "Bu ogunde pirinc/makarna/ekmek YOK. Sadece 27g karb (sebzelerden + sostan). Bu yuzden cut icin karb dostu bir ogun."], "warns": ["Kofteleri kisik ateste pisir — yuksek ateste dis yanar ic cig kalir."]}, "rose": {"t": "Rosemary Chicken Paprika", "badge": "HelloFresh", "bc": "#1D9E75", "ct": "35 dk", "kcal": 625, "p": 41, "f": 10, "c": 89, "card_original": "Kart: 679 kcal, 16Y, 89K, 41P. CUT: yag 14g→5g, sprey kullan = 625 kcal, 10Y.", "ing": [["Kipfilet / tavuk gogus (YARISI)", "~100g", "terazide tart, diger yari buzdolabina"], ["Parelcouscous / inci kuskus (YARISI)", "~75g", "terazide tart"], ["Panko paneermeel (YARISI)", "~25g", "terazide tart"], ["Paprika / dolmalik biber", "yarim adet ~80g", ""], ["Courgette / kabak", "yarim adet ~100g", ""], ["Rode ui", "yarim adet ~40g", ""], ["Tomatenketchup (YARISI)", "~20g", "kaplamada kullanilacak"], ["Midden-Oosterse kruidenmix", "yarim paket", ""], ["Verse rozemarijn / taze biberiye", "1-2 dal", "yapraklari kopar"], ["Verse bladpeterselie / maydanoz", "bir tutam ~3g", ""], ["Knoflookteen / sarimsak", "yarim dis ~3g", "ez"], ["Bloem / un", "7g", "~1 yemek kasigi"], ["Olijfolie", "5g", "terazide! (normalde 14g = 2 yk)"], ["PISIRME SPREYI", "2-3 puskurtme", "sebzeler icin, yag yerine"], ["Zwarte balsamicoazijn", "5g", "~1 tatli kasigi"], ["Groentebouillon / sebze suyu", "150g", "su + yarim bouillonblokje"], ["Su (bouillon icin)", "150g", ""]], "steps": ["FIRIN: Firini 200 dereceye ac (ust-alt isitma). Firin isininceye kadar diger adimlara basla.", "PAPRIKA FIRINLA: Paprikayi uzunlamasina 4 parcaya kes, cekirdeklerini cikar. Firin tepsisine yagli kagit ser. Paprikayi koy, PISIRME SPREYI sik + tuz serpistir. Firina ver, 20-25 dk (kenarlari hafif kararana kadar).", "KUSKUS PISIR: Sarimsagi (3g) ez. Kucuk tencereye 2g olijfolie koy (terazide!), orta ates. Sarimsagi 1 dk kavur (koku gelene kadar, yakmadan). 75g kuskusu ekle, 150g bouillon (150g su + yarim blokje) dok. Kaynadiginda atesi KISIK yap, kapak koy, 12-14 dk pisir. Karistirma.", "KORST HAZIRLA (kuskus piserken): Biberiye yapraklarini daldan kopar, ince dogra. 3 AYRI duz tabak/kase al: (A) 7g un, (B) 20g ketchup, (C) 25g panko + doranmis biberiye + bir tutam tuz + biber, karistir.", "TAVUK KAPLA: Tavugu 2 parca strec film arasina koy. Elinle veya kucuk tava ile bastirarak duzlestir (~1cm kalinlik, boylece esit piser). Sirasyla: (1) una bula her tarafi, (2) ketchup'a bula, (3) panko karisimina bula — her tarafi iyice kaplasin. IPUCU: 1 elini islak isler icin (ketchup), diger elini kuru isler icin (un, panko) kullan — yapismaz.", "TAVUK KIZART + FIRINLA: Tavaya 3g olijfolie (terazide!) koy, orta ates. Kaplamali tavugu koy, HER YUZU 2-3 dk kizart (panko altin rengi olana kadar). Sonra firin tepsisine paprikaların yanina koy, 6-8 dk daha firinda pisir (tavuk tamamen pisene kadar).", "SEBZE KAVUR (tavuk firindayken): Kabagi yarim ay dilimle (5mm). Sogani yarim halka kes. Ayni tavaya PISIRME SPREYI sik, orta ates. Kabak + sogani 5-7 dk kavur. Yarim paket Midden-Oosterse kruiden serpistir, tuz biber.", "TABAKLA: Kuskusu tabaga koy. Yanina kavrulmus sebzeleri, firindaki paprikayi ve tavugu yerlesir. Maydanozu ustune serpistir, 5g balsamico azijni paprika ustune gezdir.", "YANINDA: 1 buyuk bardak su (300g)."], "tips": ["Tavugu duzlestirmek pisirme suresini kisaltir ve esit pisirir — cig kalan yer olmaz.", "Yag kullanimi: normalde 14g olijfolie (2 yk), biz 5g kullaniyoruz (3g kuskus + 2g paprika icin sprey). 9g yag = 81 kcal tasarruf."], "warns": ["Cig tavuga dokunan bicak/tahta/el ile sebzelere DOKUNMA!", "Firin 200 derece — ELDIVEN/TUTACAK kullan! Firin tepsisini cikarirken yakinina kol uzatma."]}, "steak": {"t": "Steak Potato Salad Dill", "badge": "HelloFresh", "bc": "#1D9E75", "ct": "25 dk", "kcal": 430, "p": 31, "f": 11, "c": 52, "card_original": "Kart: 601 kcal, 30Y, 52K, 31P. 30g yagin 24g'i EKLENEN yaglardan (tereyagi+mayo+2x yag). CUT: sprey, mayo yarimla, tek yag 5g = 430 kcal, 11Y.", "ing": [["Gemarineerde steak / marine biftek (YARISI)", "~100g", "terazide tart, diger yari strec filmle buzdolabina"], ["Aardappelen / patates (YARISI)", "~200g", "terazide tart, kabuklu birak"], ["Sperziebonen / taze fasulye (YARISI)", "~75g", "uclarini kopar"], ["Radijs / turp (YARISI)", "~30g", "3-4 adet"], ["Rode ui", "yarim adet ~40g", ""], ["Verse dille / taze dereotu", "bir tutam ~3g", "saplarini at, yapraklari ince dogra"], ["Uienchutney (YARISI)", "~20g", "biftek sosu icin"], ["PISIRME SPREYI", "2 puskurtme ~2g", "tereyagi YERINE biftek pisirmek icin"], ["Olijfolie", "5g", "terazide, patates icin"], ["Mayonaise", "7g", "YARIM porsiyon! Normalde 15g = 11g yag. 7g = 5.5g yag."], ["Honing / bal", "7g", "~yarim tatli kasigi"], ["Mosterd / hardal", "5g", "~1 tatli kasigi"], ["Wittewijnazijn / beyaz sirke", "5g", "~1 tatli kasigi"], ["Su (patates buharda pisirmek icin)", "25g", ""], ["Su (biftek sosu icin)", "15g", "~1 yemek kasigi"], ["CUT: Roomboter KULLANMA", "0g", "normalde 7g tereyagi = 5.8g yag. SPREY kullan!"], ["CUT: Extra vierge olijfolie KULLANMA", "0g", "normalde 7g = 7g saf yag. ATLIYORUZ."]], "steps": ["BIFTEK HAZIRLA: Paketi ac, TERAZIDE yarisini tart (~100g). Diger yarisini strec filmle siki sar, buzdolabina koy (baska gun yiyeceksin). Bifegi tabaga koy, ODA SICAKLIGINDA 15-20 dk beklet — soguk et esit pismez.", "PATATES: Patatesleri yika (kabuk kalmali, soyma). Her birini 4 parcaya bol. Genis tavaya (hapjespan) koy, 25g su ekle, kapagi koy. ORTA ateste 12-15 dk buharda pisir. Kapagi ac, suyu varsa dokuleni dokup buharla gitsin. 5g olijfolie (terazide!) ekle, kapaksiz 5-7 dk kizart. Tuz ekle.", "FASULYE: Fasulyelerin uclarini kopar, ortadan kes. Patatesler piserken SON 6-8 dakikada ayni tencereye ekle, birlikte pisir.", "TURP + DEREOTU: Turplari ince dilimle (2mm). Dereotunu ince dogra (saplari cop). Yarisini dressing'e, yarisini garnitir icin ayir.", "DRESSING YAP: Kucuk kaseye su malzemeleri koy ve kasikla karistir: 7g mayonez + 5g hardal + 7g bal + 5g beyaz sirke + dereotunun YARISI. Tuz biber ekle. CUT NOTU: normalde buraya 7g extra vierge olijfolie de eklenir ama biz ATLADIK (7g yag = 63 kcal tasarruf).", "BIFTEK PISIR: Bifegi kagit havluyla KURULA (islak et kizarmaz, buharda pisir). Tavaya PISIRME SPREYI sik (2 puskurtme). YUKSEK ates, tavay iyice isit (30 sn). Bifegi tavaya koy — HER YUZU 2-2.5 dk pisir (medium icin). DOKUNMA, cevirme, sadece 1 kez cevir. Cikar, tuz biber serpistir, folyo/kapakla ort, 3 dk DINLENDIR (suyu icinde kalir, kurumaz).", "BIFTEK SOSU: Ayni sicak tavaya (yikama!) 20g uienchutney + 15g su ekle. 1 dk karistirarak kaynat — sos kivamina gelir.", "TABAKLA: Patates + fasulyeleri genis tabaga koy. Turp dilimlerini ekle. Dressing'i dok, hafifce karistir. Bifegi LIFLERE DIK dilimle (4-5 dilim). Tabaga koy. Sosu uzerine gezdir. Kalan dereotunu serpistir.", "YANINDA: 1 buyuk bardak su (300g)."], "tips": ["Biftek pisirme suresi: 1.5 dk/yuz = rare (kanli), 2 dk = medium-rare, 2.5 dk = medium (ideal), 3 dk = well done.", "Pisirdikten sonra 3 dk DINLENDIRMEK SART — keserken kan/su cikmasin diye. Folyo ile ortersen sogumaz.", "Dressing'e extra vierge olijfolie EKLEMIYORUZ — 7g yag = 63 kcal. Dressing mayonez+hardal+bal+sirke ile zaten lezzetli."], "warns": ["Tava COK SICAK olacak — yag sicramamasi icin eti kendinden OTE tarafa birak.", "Biftek dinlenirken foly kirismasi normal, dokunma."]}, "yulaf": {"t": "Yulaf + Kwark + Muz + Bal", "badge": "Kahvalti", "bc": "#EF9F27", "ct": "5 dk", "kcal": 420, "p": 30, "f": 5, "c": 65, "card_original": "Hesaplama: yulaf 60g (222kcal,8P,4Y,36K) + kwark 200g (92kcal,17P,0Y,8K) + muz 120g (107kcal,1P,0Y,23K) + bal 14g (46kcal,0P,0Y,11K) = toplam ~467. Yag dusuk tutmak icin bali 10g'a indir = ~420 kcal.", "ing": [["Yulaf ezmesi (havermout)", "60g", "teraziye kase koy, sifirla, 60g tart"], ["AH magere kwark", "200g", "terazide sifirla sonra 200g ekle"], ["Muz", "1 adet ~120g", "soy, dilimle veya catalla ez"], ["Bal", "10g", "terazide! (10g = ~1 tatli kasigi. Bal yogun: 10ml = ~14g)"]], "steps": ["Teraziye kaseyi koy, SIFIR'a bas.", "60g yulaf ezmesi koy. Teraziyi tekrar sifirla.", "200g magere kwark ekle. Teraziyi tekrar sifirla.", "Muzu soy, uzerine dilimle veya catalla ezip karistir.", "10g bal gezdir. Karistir. Ye! Cok koyu ise 50g su ekle."], "tips": ["Kwark 1kg paket AH'dan ~2.49 EUR — haftada 4-5 gun kullanacaksin.", "Bal terazide TART — kasikla dokunce cok konur. 10g = 1 kucuk tatli kasigi."], "warns": []
